name: YouTube Transcript Fetcher

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube URL'
        required: true
        type: string
      filename:
        description: 'Output filename (without extension, default: transcript)'
        required: false
        type: string
        default: 'transcript'

jobs:
  fetch-transcript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install youtube-transcript-api requests
      
      - name: Fetch YouTube transcript
        run: |
          python << 'EOF'
          from youtube_transcript_api import YouTubeTranscriptApi
          from urllib.parse import urlparse, parse_qs
          import os
          from datetime import datetime
          
          url = "${{ inputs.youtube_url }}"
          filename = "${{ inputs.filename }}"
          
          # Extract video ID from URL
          video_id = None
          parsed_url = urlparse(url)
          query_params = parse_qs(parsed_url.query)
          
          if 'v' in query_params:
              video_id = query_params['v'][0]
          elif 'youtu.be' in url:
              video_id = url.split('youtu.be/')[-1].split('?')[0]
          
          if not video_id:
              print(f"Could not extract video ID from: {url}")
              exit(1)
          
          print(f"Extracted video ID: {video_id}")
          
          os.makedirs('transcripts', exist_ok=True)
          
          try:
              print("Fetching transcript...")
              
              # Get transcript - this will try English first, then any available language
              try:
                  transcript = YouTubeTranscriptApi.get_transcript(video_id, languages=['en'])
                  print("✓ Retrieved English transcript")
              except:
                  # If English not available, get any available language
                  print("English not available, trying any available language...")
                  transcript_list = YouTubeTranscriptApi.list_transcripts(video_id)
                  
                  # Try manually created first
                  if transcript_list.manually_created_transcripts:
                      lang = list(transcript_list.manually_created_transcripts.keys())[0]
                      transcript = transcript_list.manually_created_transcripts[lang].fetch()
                      print(f"✓ Retrieved manually created transcript in {lang}")
                  # Then try auto-generated
                  elif transcript_list.generated_transcripts:
                      lang = list(transcript_list.generated_transcripts.keys())[0]
                      transcript = transcript_list.generated_transcripts[lang].fetch()
                      print(f"✓ Retrieved auto-generated transcript in {lang}")
                  else:
                      print("✗ No transcripts available")
                      exit(1)
              
              # Get video title from transcript metadata if available
              video_title = "YouTube Video"
              
              # Try to get title from requests
              try:
                  import requests
                  from bs4 import BeautifulSoup
                  headers = {'User-Agent': 'Mozilla/5.0'}
                  response = requests.get(f"https://www.youtube.com/watch?v={video_id}", headers=headers, timeout=10)
                  if response.status_code == 200:
                      # Extract title from og:title meta tag
                      if '<meta property="og:title"' in response.text:
                          import re
                          match = re.search(r'<meta property="og:title" content="([^"]+)"', response.text)
                          if match:
                              video_title = match.group(1)
                              print(f"✓ Retrieved video title: {video_title}")
              except Exception as e:
                  print(f"Warning: Could not retrieve video title: {e}")
              
              # Combine transcript entries
              transcript_text = '\n'.join([item['text'] for item in transcript])
              
              # Create markdown file
              md_file = f"transcripts/{filename}.md"
              with open(md_file, 'w') as f:
                  f.write(f"# {video_title}\n\n")
                  f.write(f"**Source:** {url}\n")
                  f.write(f"**Video ID:** {video_id}\n")
                  f.write(f"**Fetched:** {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}\n\n")
                  f.write("## Transcript\n\n")
                  f.write(transcript_text)
              
              print(f"✓ Transcript saved to {md_file}")
              
          except Exception as e:
              print(f"✗ Error: {e}")
              import traceback
              traceback.print_exc()
              exit(1)
          EOF
      
      - name: Commit and push transcript
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add transcripts/
          git commit -m "Add YouTube transcript: ${{ inputs.filename }}" || echo "No changes to commit"
          git push
