name: YouTube Transcript Fetcher

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube URL'
        required: true
        type: string
      filename:
        description: 'Output filename (without extension, default: transcript)'
        required: false
        type: string
        default: 'transcript'

jobs:
  fetch-transcript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yt-dlp
      
      - name: Fetch YouTube transcript
        id: transcript
        env:
          YOUTUBE_URL: ${{ inputs.youtube_url }}
          FILENAME: ${{ inputs.filename }}
        run: |
          python << 'EOF'
          import yt_dlp
          import sys
          import os
          from datetime import datetime
          
          url = os.environ.get('YOUTUBE_URL')
          filename = os.environ.get('FILENAME')
          
          # Create transcripts directory if it doesn't exist
          os.makedirs('transcripts', exist_ok=True)
          
          ydl_opts = {
              'quiet': False,
              'no_warnings': False,
              'skip_download': True,
              'extractor_args': {'youtube': {'skip_webpage': False}},
              'socket_timeout': 30,
          }
          
          try:
              with yt_dlp.YoutubeDL(ydl_opts) as ydl:
                  print(f"Fetching transcript from: {url}")
                  info = ydl.extract_info(url, download=False)
                  subtitles = info.get('subtitles', {})
                  video_title = info.get('title', 'Unknown')
                  
                  print(f"Available languages: {list(subtitles.keys())}")
                  
                  # Try English first, then any available language
                  lang = None
                  if 'en' in subtitles:
                      lang = 'en'
                  elif subtitles:
                      lang = list(subtitles.keys())[0]
                  
                  if lang:
                      transcript = '\n'.join([item['text'] for item in subtitles[lang]])
                      
                      # Create markdown file with metadata
                      output_file = f"transcripts/{filename}.md"
                      with open(output_file, 'w') as f:
                          f.write(f"# {video_title}\n\n")
                          f.write(f"**Source:** {url}\n")
                          f.write(f"**Language:** {lang}\n")
                          f.write(f"**Fetched:** {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}\n\n")
                          f.write("## Transcript\n\n")
                          f.write(transcript)
                      
                      print(f"✓ Transcript saved to {output_file}")
                  else:
                      print(f"✗ No subtitles found.")
                      sys.exit(1)
          except Exception as e:
              print(f"✗ Error: {e}")
              import traceback
              traceback.print_exc()
              sys.exit(1)
          EOF
      
      - name: Commit and push transcript
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add transcripts/
          git commit -m "Add YouTube transcript: ${{ inputs.filename }}" || echo "No changes to commit"
          git push
