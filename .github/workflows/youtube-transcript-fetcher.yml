name: YouTube Transcript Fetcher

on:
  workflow_dispatch:
    inputs:
      youtube_url:
        description: 'YouTube URL'
        required: true
        type: string
      filename:
        description: 'Output filename (without extension, default: transcript)'
        required: false
        type: string
        default: 'transcript'

jobs:
  fetch-transcript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytube youtube-transcript-api requests
      
      - name: Fetch YouTube transcript
        run: |
          python << 'EOF'
          from youtube_transcript_api import YouTubeTranscriptApi
          from urllib.parse import urlparse, parse_qs
          import os
          from datetime import datetime
          import re
          
          url = "${{ inputs.youtube_url }}"
          filename = "${{ inputs.filename }}"
          
          # Extract video ID from URL
          video_id = None
          parsed_url = urlparse(url)
          query_params = parse_qs(parsed_url.query)
          
          if 'v' in query_params:
              video_id = query_params['v'][0]
          elif 'youtu.be' in url:
              video_id = url.split('youtu.be/')[-1].split('?')[0]
          
          if not video_id:
              print(f"Could not extract video ID from: {url}")
              exit(1)
          
          print(f"Extracted video ID: {video_id}")
          
          os.makedirs('transcripts', exist_ok=True)
          
          try:
              # Fetch available captions
              print("Fetching available captions...")
              captions = YouTubeTranscriptApi.list_transcripts(video_id)
              
              # Try to get English captions
              transcript = None
              if 'en' in captions.manually_created_transcripts:
                  transcript = captions.manually_created_transcripts['en'].fetch()
                  print("✓ Using manually created English captions")
              elif captions.manually_created_transcripts:
                  # Get first available manually created caption
                  first_lang = list(captions.manually_created_transcripts.keys())[0]
                  transcript = captions.manually_created_transcripts[first_lang].fetch()
                  print(f"✓ Using manually created captions in {first_lang}")
              elif 'en' in captions.generated_transcripts:
                  transcript = captions.generated_transcripts['en'].fetch()
                  print("✓ Using auto-generated English captions")
              elif captions.generated_transcripts:
                  # Get first available generated caption
                  first_lang = list(captions.generated_transcripts.keys())[0]
                  transcript = captions.generated_transcripts[first_lang].fetch()
                  print(f"✓ Using auto-generated captions in {first_lang}")
              else:
                  print("✗ No captions available for this video")
                  exit(1)
              
              # Get video title
              from pytube import YouTube
              yt = YouTube(url)
              video_title = yt.title
              
              # Combine transcript entries
              transcript_text = '\n'.join([item['text'] for item in transcript])
              
              # Create markdown file
              md_file = f"transcripts/{filename}.md"
              with open(md_file, 'w') as f:
                  f.write(f"# {video_title}\n\n")
                  f.write(f"**Source:** {url}\n")
                  f.write(f"**Video ID:** {video_id}\n")
                  f.write(f"**Fetched:** {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}\n\n")
                  f.write("## Transcript\n\n")
                  f.write(transcript_text)
              
              print(f"✓ Transcript saved to {md_file}")
              
          except Exception as e:
              print(f"✗ Error: {e}")
              import traceback
              traceback.print_exc()
              exit(1)
          EOF
      
      - name: Commit and push transcript
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add transcripts/
          git commit -m "Add YouTube transcript: ${{ inputs.filename }}" || echo "No changes to commit"
          git push
